name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; cancel in-progress runs but let queued ones finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # Use `npm install` instead of `npm ci` because we don't commit a
        # package-lock.json. The `--no-audit --no-fund` flags keep output clean.
        # `--legacy-peer-deps` avoids ERESOLVE errors from React 19 peer ranges.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
